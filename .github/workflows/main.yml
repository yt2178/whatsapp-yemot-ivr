name: WhatsApp to Yemot IVR

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-faster-whisper-edge-v4
          restore-keys: pip-

      - name: Install dependencies
        run: pip install requests faster-whisper edge-tts

      - name: Cache Whisper model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: whisper-small-he-v1

      - name: Run processor
        env:
          GREEN_API_INSTANCE_ID: ${{ secrets.GREEN_API_INSTANCE_ID }}
          GREEN_API_TOKEN: ${{ secrets.GREEN_API_TOKEN }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_PHONE_NUMBER_ID: ${{ secrets.META_PHONE_NUMBER_ID }}
          YEMOT_USERNAME: ${{ secrets.YEMOT_USERNAME }}
          YEMOT_PASSWORD: ${{ secrets.YEMOT_PASSWORD }}
          YEMOT_EXTENSION: ${{ secrets.YEMOT_EXTENSION }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py
